name: Deploy Terraform to AWS

on:
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destruir infraestrutura? (true/false)'
        required: true
        default: 'false'

permissions:
  id-token: write
  contents: read

jobs:
  # JOB 1: VALIDAÇÃO (Apenas se não for destruir)
  validate:
    if: ${{ github.event.inputs.destroy == 'false' }}
    name: 🔎 Validar Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Credenciais AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validar Sintaxe e Plano
        working-directory: infra
        run: |
          terraform init
          terraform fmt -check
          terraform validate

  # JOB 2: DEPLOY E ANSIBLE
  deploy:
    if: ${{ github.event.inputs.destroy == 'false' }}
    name: 🚀 Deploy e Configuração
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      instanceId: ${{ steps.output_aws.outputs.instance_id }}
      publicIP: ${{ steps.output_aws.outputs.public_ip }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Credenciais AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Aplicar Terraform
        working-directory: infra
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Capturar Outputs
        id: output_aws
        working-directory: infra
        run: |
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT
          echo "public_ip=$(terraform output -raw public_ip_address)" >> $GITHUB_OUTPUT

      - name: Instalar Ansible e sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible sshpass

      - name: Executar Playbook Ansible
        run: |
          echo "[vm]" > inventory
          echo "${{ steps.output_aws.outputs.public_ip }} ansible_user=ubuntu ansible_password=${{ secrets.ADMIN_PASSWORD }} ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> inventory
          
          echo "Aguardando 30s para o SSH ficar disponível..."
          sleep 30
          
          ansible-playbook -i inventory ansible/playbook.yml --extra-vars "ansible_sudo_pass=${{ secrets.ADMIN_PASSWORD }}"

  # JOB 3: PÓS-TESTES
  post-tests:
    if: ${{ github.event.inputs.destroy == 'false' }}
    name: ✅ Pós-Testes
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Testar Swagger na Porta 8081
        run: |
          echo "Testando API em http://${{ needs.deploy.outputs.publicIP }}:8081"
          sleep 20
          curl -Is http://${{ needs.deploy.outputs.publicIP }}:8081/swagger-ui/index.html | head -n 1

  # JOB 4: DESTROY (Roda apenas quando destroy == 'true')
  destroy:
    if: ${{ github.event.inputs.destroy == 'true' }}
    name: 🧨 Destruir Infraestrutura
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Credenciais AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Executar Terraform Destroy
        working-directory: infra
        run: |
          # O init é obrigatório para conectar ao Backend S3 e baixar o estado
          terraform init
          terraform destroy -auto-approve